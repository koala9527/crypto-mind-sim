version: '3.8'

services:
  app:
    image: registry.cn-shenzhen.aliyuncs.com/koala9527/crypto-mind-sim
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: cryptomindsim
    restart: always
    ports:
      - "8099:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/stats', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - cryptomindsim-network

networks:
  cryptomindsim-network:
    driver: bridge
