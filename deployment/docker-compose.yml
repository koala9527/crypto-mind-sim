services:
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: cryptomindsim
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - cryptomindsim-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: cryptomindsim-db
    restart: unless-stopped
    profiles:
      - with-db
    environment:
      POSTGRES_USER: neotrade
      POSTGRES_PASSWORD: neotrade_pass
      POSTGRES_DB: neotrade
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cryptomindsim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neotrade -d neotrade"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  app-data:
  postgres-data:

networks:
  cryptomindsim-network:
    driver: bridge
