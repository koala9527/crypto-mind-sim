version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cryptomindsim-prod
    restart: always
    ports:
      - "80:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://neotrade:neotrade_pass@db:5432/neotrade
      - HOST=0.0.0.0
      - PORT=8000
      - INITIAL_BALANCE=10000.0
      - LIQUIDATION_THRESHOLD=0.9
      - PRICE_UPDATE_INTERVAL=60
      - EXCHANGE=binance
      - TRADING_PAIR=BTC/USDT
      - LEADERBOARD_TOP_N=10
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/stats', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - cryptomindsim-network

networks:
  cryptomindsim-network:
    driver: bridge
